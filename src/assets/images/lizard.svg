<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
	<!-- Curling tail -->
	<path d="M50,78 C60,88 66,95 58,100" fill="none" stroke="#e74c3c" stroke-width="10" stroke-linecap="round"/>

	<!-- Legs -->
	<ellipse cx="22" cy="38" rx="11" ry="7" fill="#e74c3c" stroke="#5d1a1a" stroke-width="1.5" transform="rotate(-25 22 38)"/>
	<ellipse cx="78" cy="38" rx="11" ry="7" fill="#e74c3c" stroke="#5d1a1a" stroke-width="1.5" transform="rotate(25 78 38)"/>
	<ellipse cx="24" cy="68" rx="11" ry="7" fill="#e74c3c" stroke="#5d1a1a" stroke-width="1.5" transform="rotate(25 24 68)"/>
	<ellipse cx="76" cy="68" rx="11" ry="7" fill="#e74c3c" stroke="#5d1a1a" stroke-width="1.5" transform="rotate(-25 76 68)"/>

	<!-- Toe pads -->
	<g fill="#5d1a1a">
		<circle cx="10" cy="34" r="1.6"/>
		<circle cx="11" cy="42" r="1.6"/>
		<circle cx="90" cy="34" r="1.6"/>
		<circle cx="89" cy="42" r="1.6"/>
		<circle cx="11" cy="64" r="1.6"/>
		<circle cx="12" cy="72" r="1.6"/>
		<circle cx="89" cy="64" r="1.6"/>
		<circle cx="88" cy="72" r="1.6"/>
	</g>

	<!-- Body -->
	<ellipse cx="50" cy="55" rx="26" ry="32" fill="#e74c3c" stroke="#5d1a1a" stroke-width="1.8"/>

	<!-- Belly stripe -->
	<ellipse cx="50" cy="58" rx="13" ry="22" fill="#ff9e8a" opacity="0.7"/>

	<!-- Back spots -->
	<g fill="#a93226">
		<circle cx="40" cy="44" r="2.5"/>
		<circle cx="60" cy="44" r="2.5"/>
		<circle cx="40" cy="62" r="2.5"/>
		<circle cx="60" cy="62" r="2.5"/>
		<circle cx="50" cy="53" r="2"/>
		<circle cx="50" cy="71" r="2"/>
	</g>

	<!-- Head -->
	<ellipse cx="50" cy="26" rx="24" ry="19" fill="#e74c3c" stroke="#5d1a1a" stroke-width="1.8"/>

	<!-- Cheek blush -->
	<circle cx="32" cy="32" r="3" fill="#ffb3a7" opacity="0.6"/>
	<circle cx="68" cy="32" r="3" fill="#ffb3a7" opacity="0.6"/>

	<!-- Eyes -->
	<circle cx="40" cy="23" r="7.5" fill="white" stroke="#222" stroke-width="1.5"/>
	<circle cx="60" cy="23" r="7.5" fill="white" stroke="#222" stroke-width="1.5"/>
	<circle cx="41" cy="24" r="4.2" fill="#222"/>
	<circle cx="61" cy="24" r="4.2" fill="#222"/>
	<circle cx="39" cy="22" r="1.8" fill="white"/>
	<circle cx="59" cy="22" r="1.8" fill="white"/>

	<!-- Nostrils -->
	<circle cx="46" cy="36" r="1" fill="#5d1a1a"/>
	<circle cx="54" cy="36" r="1" fill="#5d1a1a"/>

	<!-- Smile -->
	<path d="M43,40 Q50,45 57,40" fill="none" stroke="#5d1a1a" stroke-width="1.5" stroke-linecap="round"/>
</svg>
