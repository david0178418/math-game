<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
	<!-- 8 Legs -->
	<g fill="none" stroke="#4a148c" stroke-width="4" stroke-linecap="round">
		<path d="M38,42 Q22,28 6,18"/>
		<path d="M35,52 Q15,44 2,38"/>
		<path d="M35,62 Q15,68 2,72"/>
		<path d="M38,72 Q22,82 8,92"/>
		<path d="M62,42 Q78,28 94,18"/>
		<path d="M65,52 Q85,44 98,38"/>
		<path d="M65,62 Q85,68 98,72"/>
		<path d="M62,72 Q78,82 92,92"/>
	</g>

	<!-- Foot tips -->
	<g fill="#4a148c">
		<circle cx="6" cy="18" r="2.5"/>
		<circle cx="2" cy="38" r="2.5"/>
		<circle cx="2" cy="72" r="2.5"/>
		<circle cx="8" cy="92" r="2.5"/>
		<circle cx="94" cy="18" r="2.5"/>
		<circle cx="98" cy="38" r="2.5"/>
		<circle cx="98" cy="72" r="2.5"/>
		<circle cx="92" cy="92" r="2.5"/>
	</g>

	<!-- Abdomen (large, behind) -->
	<ellipse cx="50" cy="65" rx="26" ry="28" fill="#7b1fa2" stroke="#3d1352" stroke-width="2"/>

	<!-- Abdomen highlight -->
	<ellipse cx="50" cy="58" rx="13" ry="14" fill="#a64ac9" opacity="0.65"/>

	<!-- Hourglass marking -->
	<path d="M45,53 L55,53 L48,62 L55,72 L45,72 L52,62 Z" fill="#3d1352" opacity="0.85"/>

	<!-- Cephalothorax (head section) -->
	<ellipse cx="50" cy="32" rx="19" ry="17" fill="#8e24aa" stroke="#3d1352" stroke-width="2"/>

	<!-- Cheek blush -->
	<circle cx="36" cy="38" r="3" fill="#ce93d8" opacity="0.7"/>
	<circle cx="64" cy="38" r="3" fill="#ce93d8" opacity="0.7"/>

	<!-- Big main eyes -->
	<circle cx="42" cy="28" r="6.5" fill="white" stroke="#222" stroke-width="1.5"/>
	<circle cx="58" cy="28" r="6.5" fill="white" stroke="#222" stroke-width="1.5"/>
	<circle cx="43" cy="29" r="3.8" fill="#222"/>
	<circle cx="59" cy="29" r="3.8" fill="#222"/>
	<circle cx="41" cy="27" r="1.5" fill="white"/>
	<circle cx="57" cy="27" r="1.5" fill="white"/>

	<!-- Small side eyes -->
	<circle cx="34" cy="34" r="2.5" fill="white" stroke="#222" stroke-width="1"/>
	<circle cx="66" cy="34" r="2.5" fill="white" stroke="#222" stroke-width="1"/>
	<circle cx="34" cy="34" r="1.3" fill="#222"/>
	<circle cx="66" cy="34" r="1.3" fill="#222"/>

	<!-- Smile -->
	<path d="M46,42 Q50,46 54,42" fill="none" stroke="#3d1352" stroke-width="1.5" stroke-linecap="round"/>
